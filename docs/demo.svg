<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .terminal { font-family: 'Fira Code', 'Courier New', Courier, monospace; font-size: 13px; fill: #a6accd; }
      .bold { font-weight: bold; }
      .green { fill: #c3e88d; }
      .red { fill: #f07178; }
      .yellow { fill: #f78c6c; }
      .blue { fill: #82aaff; }
      .cyan { fill: #89ddff; }
      .title { fill: #eeffff; }
      .comment { fill: #676e95; }
    </style>
  </defs>

  <!-- Terminal Window Background -->
  <rect width="800" height="500" rx="10" fill="#0f1419" />
  
  <!-- Window Header -->
  <rect width="800" height="35" rx="10" fill="#1e242c" />
  <!-- Window controls -->
  <circle cx="20" cy="18" r="6" fill="#ff5f56" />
  <circle cx="40" cy="18" r="6" fill="#ffbd2e" />
  <circle cx="60" cy="18" r="6" fill="#27c93f" />
  
  <!-- Window Title -->
  <text x="400" y="22" text-anchor="middle" class="terminal title bold">sebastian@macbook: ~/legal-function-operating-system</text>

  <!-- Terminal Content -->
  <g class="terminal" transform="translate(25, 60)">
    <text x="0" y="0" class="comment">$ make demo</text>
    <text x="0" y="20" class="blue bold"># Legal Function — Board Operations Pack</text>
    <text x="0" y="40" class="comment">_Period: Q2 2026 (synthetic)_</text>
    
    <text x="0" y="70" class="yellow bold">## Executive summary</text>
    <text x="0" y="90">- <tspan class="cyan bold">8</tspan> legal requests handled · <tspan class="red bold">5</tspan> high-risk</text>
    <text x="0" y="110">- <tspan class="cyan bold">5</tspan> require GC sign-off · <tspan class="yellow bold">3</tspan> flagged for board attention</text>
    <text x="0" y="130">- <tspan class="cyan bold">3</tspan> external-counsel referrals · <tspan class="red bold">1</tspan> SLA breaches</text>
    
    <text x="0" y="160" class="yellow bold">## Board attention</text>
    <text x="0" y="180" class="comment">| ID       | Title                                     | Risk | Type                |</text>
    <text x="0" y="200" class="comment">| -------- | ----------------------------------------- | ---- | ------------------- |</text>
    <text x="0" y="220">| <tspan class="cyan">REQ-1001</tspan> | Enterprise MSA — Globex (synthetic)       | <tspan class="red bold">HIGH</tspan> | commercial_contract |</text>
    <text x="0" y="240">| <tspan class="cyan">REQ-1005</tspan> | Series B financing — term sheet (synth)   | <tspan class="red bold">HIGH</tspan> | fundraising         |</text>
    <text x="0" y="260">| <tspan class="cyan">REQ-1007</tspan> | Customer dispute — SLA credits claim      | <tspan class="red bold">HIGH</tspan> | dispute             |</text>
    
    <text x="0" y="290" class="yellow bold">## SLA breaches</text>
    <text x="0" y="310">- <tspan class="red">REQ-1006</tspan> — Vendor security questionnaire — analytics tool (synthetic)</text>
    
    <text x="0" y="340" class="yellow bold">## External-counsel referrals</text>
    <text x="0" y="360" class="comment">| ID       | Title                                     | Referral                            |</text>
    <text x="0" y="380">| <tspan class="cyan">REQ-1004</tspan> | AI feature governance — agent autonomy    | External: AI/privacy specialist     |</text>
    <text x="0" y="400">| <tspan class="cyan">REQ-1005</tspan> | Series B financing — term sheet (synth)   | External: corporate counsel         |</text>
    
    <text x="0" y="420" class="green bold">OK - 17 tests passed</text>
  </g>
</svg>